- name: Set up GitLab Runner
  hosts: gitlab_runners
  become: true
  vars_files:
    - vars.yml
  vars:
    gitlab_server_ip: "{{ hostvars[groups['gitlab_servers'][0]]['ansible_host'] | default(groups['gitlab_servers'][0]) }}"
    runner_token_env: "{{ lookup('env', 'GITLAB_RUNNER_TOKEN') }}"

  tasks:
    - name: Get GitLab initial root password from container
      ansible.builtin.shell: |
        podman exec gitlab cat /etc/gitlab/initial_root_password | grep '^Password:' | awk '{print $2}'
      delegate_to: "{{ groups['gitlab_servers'][0] }}"
      register: gitlab_root_password
      changed_when: false
      no_log: true
      when: runner_token_env == ""

    - name: Wait for GitLab to be fully ready (health check)
      ansible.builtin.uri:
        url: "https://127.0.0.1/-/health"
        headers:
          Host: "{{ gitlab_domain }}"
        validate_certs: false
        status_code: 200
      register: health_check
      retries: 40
      delay: 30
      until: health_check.status == 200
      delegate_to: "{{ groups['gitlab_servers'][0] }}"
      become: false
      when: runner_token_env == ""

    - name: Create temporary admin PAT via GitLab Rails
      ansible.builtin.shell: |
        podman exec gitlab gitlab-rails runner \
          "u = User.find(1);
           u.personal_access_tokens.find_by(name: 'ansible-runner-bootstrap-{{ inventory_hostname }}')&.revoke!;
           t = u.personal_access_tokens.create!(
             name: 'ansible-runner-bootstrap-{{ inventory_hostname }}',
             scopes: ['api'],
             expires_at: 1.day.from_now
           );
           puts t.token"
      delegate_to: "{{ groups['gitlab_servers'][0] }}"
      register: gitlab_admin_pat
      changed_when: true
      when: runner_token_env == ""

    - name: Create runner via GitLab API using PAT
      ansible.builtin.uri:
        url: "https://127.0.0.1/api/v4/user/runners"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ gitlab_admin_pat.stdout | trim }}"
          Host: "{{ gitlab_domain }}"
        body_format: json
        body:
          runner_type: "instance_type"
          description: "ansible-managed-runner-{{ inventory_hostname }}"
        validate_certs: false
        status_code: 201
      register: gitlab_runner_api
      delegate_to: "{{ groups['gitlab_servers'][0] }}"
      become: false
      when: runner_token_env == ""

    - name: Revoke temporary admin PAT
      ansible.builtin.shell: |
        podman exec gitlab gitlab-rails runner \
          "PersonalAccessToken.find_by(name: 'ansible-runner-bootstrap-{{ inventory_hostname }}')&.revoke!"
      delegate_to: "{{ groups['gitlab_servers'][0] }}"
      changed_when: true
      when: runner_token_env == ""

    - name: Set runner token
      ansible.builtin.set_fact:
        runner_token: >-
          {{ runner_token_env if runner_token_env != ""
             else gitlab_runner_api.json.token }}


    - name: Install Podman and SELinux tools
      ansible.builtin.dnf:
        name:
          - podman
          - policycoreutils-python-utils
        state: present

    - name: Enable Podman socket
      ansible.builtin.systemd:
        name: podman.socket
        enabled: true
        state: started

    - name: Create GitLab Runner config directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ gitlab_runner_config_dir }}"
        - "{{ gitlab_runner_config_dir }}/certs"

    - name: Fetch GitLab SSL certificate from GitLab server
      ansible.builtin.slurp:
        src: "{{ gitlab_config_dir }}/ssl/{{ gitlab_domain }}.crt"
      delegate_to: "{{ groups['gitlab_servers'][0] }}"
      register: gitlab_ssl_cert

    - name: Install GitLab SSL certificate for runner TLS verification
      ansible.builtin.copy:
        content: "{{ gitlab_ssl_cert.content | b64decode }}"
        dest: "{{ gitlab_runner_config_dir }}/certs/{{ gitlab_domain }}.crt"
        mode: "0644"

    - name: Apply SELinux context on Runner config directory
      ansible.builtin.command: >
        semanage fcontext -a -t container_file_t "{{ gitlab_runner_config_dir }}(/.*)?"
      changed_when: true

    - name: Restore SELinux context on Runner config directory
      ansible.builtin.command: restorecon -Rv "{{ gitlab_runner_config_dir }}"
      changed_when: true

    - name: Register runner
      ansible.builtin.shell: |
        podman run --rm \
          -v {{ gitlab_runner_config_dir }}:/etc/gitlab-runner:Z \
          --add-host "{{ gitlab_domain }}:{{ gitlab_server_ip }}" \
          {{ gitlab_runner_image }} register \
          --non-interactive \
          --url "{{ gitlab_url }}" \
          --token "{{ runner_token }}" \
          --executor "docker" \
          --docker-image "alpine:latest" \
          --docker-volumes "/run/podman/podman.sock:/var/run/docker.sock" \
          --description "ansible-managed-runner-{{ inventory_hostname }}"
      args:
        creates: "{{ gitlab_runner_config_dir }}/config.toml"

    - name: Configure runner concurrency
      ansible.builtin.lineinfile:
        path: "{{ gitlab_runner_config_dir }}/config.toml"
        regexp: '^concurrent ='
        line: 'concurrent = {{ runner_concurrency }}'
      notify: Reload systemd and start GitLab Runner

    - name: Create Quadlet directory
      ansible.builtin.file:
        path: /etc/containers/systemd
        state: directory
        mode: "0755"

    - name: Deploy GitLab Runner Quadlet container unit
      ansible.builtin.copy:
        dest: /etc/containers/systemd/gitlab-runner.container
        mode: "0644"
        content: |
          [Unit]
          Description=GitLab Runner Container
          After=network-online.target podman.socket
          Wants=network-online.target

          [Container]
          Image={{ gitlab_runner_image }}
          ContainerName=gitlab-runner
          Volume={{ gitlab_runner_config_dir }}:/etc/gitlab-runner:Z
          Volume=/run/podman/podman.sock:/var/run/docker.sock:Z
          Label=io.containers.autoupdate=registry
          AddHost={{ gitlab_domain }}:{{ gitlab_server_ip }}

          [Service]
          Restart=always

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd and start GitLab Runner

  handlers:
    - name: Reload systemd and start GitLab Runner
      ansible.builtin.shell: |
        systemctl daemon-reload
        systemctl enable gitlab-runner
        systemctl restart gitlab-runner || systemctl start gitlab-runner
      changed_when: true
